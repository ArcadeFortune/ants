<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      pre {
        margin: 0
      }

      .history {
        height: 80vh;
        width: 100%;
        overflow: auto;
        display: flex;
        flex-direction: column-reverse;

        fieldset {
          animation: newMessage 2s ease-out forwards;
          mix-blend-mode: normal;

          &.error {
            animation: newError 2s ease-out forwards;
          }

          legend {
            animation: inherit;
            mix-blend-mode: normal;
          }
        }

      }

      @keyframes newMessage {
        from {
          background-color: #00ff7b64;
        }

        to {
          background-color: rgba(255, 255, 255, 0);
        }
      }

      @keyframes newError {
        from {
          background-color: #ff00004a;
        }

        to {
          background-color: rgba(255, 255, 255, 0);
        }
      }
    </style>
  </head>

  <body>
    <h2>Status</h2>
    <div class="status"></div>

    <h2>map</h2>
    <canvas id="grid" width="350" height="350"></canvas>

    <h2>buttons</h2>
    <div class="buttons"></div>

    <h2>history</h2>
    <div class="history"></div>

    <script>
      class Model {
        constructor() {
          this.ws = null;
          this.state = {
            myHives: [],
            myAnts: []
          }
          this.listeners = [];
        }
        establishConnection() {
          this.ws = new WebSocket("ws://localhost:8080");
          this.notify({
            type: "connectionTry"
          })
          this.ws.onopen = () => {
            this.notify({
              type: "connectionSuccessful"
            })
          }
          this.ws.onmessage = (m) => this.handleMessage(m);
          this.ws.onerror = (e) => this.notify({
            type: "error",
            from: "Server",
            body: e,
          });
          this.ws.onclose = () => this.notify({
            type: "log",
            from: "Server",
            body: {
              type: "error",
              body: {
                code: 500,
                message: "Connection closed."
              }
            },
          });
        }
        handleMessage(m) {
          try {
            const msg = JSON.parse(m.data);
            this.notify({
              type: "log",
              from: "Server",
              body: msg,
            })
            switch (msg.type) {
              case "init":
                this.notify({
                  type: "renderTiles",
                  body: msg.body.tiles
                })
              case "yourHive":
                const myHiveId = msg.body.you.hives[0].id;
                const myHive = msg.body.tiles.find(t => t.type === "hive" && t.hiveId === myHiveId);
                this.state.myHives.push(myHive);
                this.state.myAnts.push(...msg.body.you.ants);
                this.notify({
                  type: "playableAnts",
                  body: this.state.myAnts,
                })
            }
          } catch (e) {
            this.notify({
              type: "error",
              from: "Client",
              body: e.stack ?? e,
            })
          }
        }
        subscribe(listener) {
          this.listeners.push(listener);
        }
        notify(payload) {
          for (const listener of this.listeners) {
            listener(payload);
          }
        }
        send(msg) {
          this.ws.send(JSON.stringify(msg));
          this.notify({
            type: "log",
            from: "Client",
            body: msg,
          })
        }
        ping() {
          this.send({ type: "ping" })
        }
        whoami() {
          this.send({ type: "whoami" })
        }
        move(antId, direction) {
          this.send({
            type: "move", antId, direction
          })
        }
      }

      class View {
        constructor() {
          this.status = document.querySelector(".status")
          this.buttons = document.querySelector(".buttons")
          this.history = document.querySelector(".history")
          this.viewCanvas = new ViewCanvas();
          if (!this.status || !this.buttons || !this.history) {
            throw new Error("Unable to initialize UI.")
          }
        }
        el(tag, txt, cls, ...atrs) {
          const e = document.createElement(tag)
          if (txt) e.innerText = txt;
          if (typeof cls === "string") e.classList.add(...cls.split(" ").filter(Boolean));
          for (const attr of atrs) {
            if (!attr || typeof attr !== "object") continue;
            for (const [name, value] of Object.entries(attr)) {
              if (name.startsWith("on") && typeof value === "function") {
                e.addEventListener(name.slice(2), value)
              } else {
                e.setAttribute(name, value);
              }
            }
          }
          return e;
        }
        setStatus(message) {
          this.status.innerHTML = ""
          this.addStatus(message)
        }
        addStatus(message) {
          const el = this.el("div", message);
          this.status.appendChild(el)
        }
        addHistory(message, source) {
          if (typeof message === "string") message = JSON.parse(message);
          const box = this.el("fieldset", '', message.type === "error" ? "error" : "");
          const legend = this.el("legend", `${source} - ${new Date().toLocaleTimeString()}`)
          box.appendChild(legend)
          const pre = this.el("pre", JSON.stringify(message, null, 2));
          box.appendChild(pre)
          this.history.appendChild(box)
          box.scrollIntoView({ behavior: "smooth", block: "start", container: "nearest" });
        }
        showConnectUI(connectFn) {
          this.buttons.innerHTML = "";
          const connectBtn = this.el("button", "connect", "", { type: "button" }, { onclick: connectFn });
          this.buttons.appendChild(connectBtn);
        }
        showControlUI(inputFn) {
          this.buttons.innerHTML = "";
          const pingBtn = this.el("button", "ping", "", { type: "button" }, { onclick: () => inputFn({ type: 'ping' }) })
          const hiveBtn = this.el("button", "hive", "", { type: "button" }, { onclick: () => inputFn({ type: 'hive' }) })
          this.buttons.appendChild(pingBtn);
          this.buttons.appendChild(hiveBtn);
        }
        showAntsUI(allAnts, onSelectFn) {
          allAnts.forEach((ant, i) => {
            const antBtn = this.el("button", `Ant #${i}`, "", { type: "button" }, { onclick: () => onSelectFn(ant) })
            this.buttons.append(antBtn)
          })
        }
        showMoveUI(onMoveFn) {
          const nBtn = this.el("button", "North", "", { type: "button" }, { onclick: () => onMoveFn("n") })
          const neBtn = this.el("button", "North East", "", { type: "button" }, { onclick: () => onMoveFn("ne") })
          const eBtn = this.el("button", "East", "", { type: "button" }, { onclick: () => onMoveFn("e") })
          const seBtn = this.el("button", "South East", "", { type: "button" }, { onclick: () => onMoveFn("se") })
          const sBtn = this.el("button", "South", "", { type: "button" }, { onclick: () => onMoveFn("s") })
          const swBtn = this.el("button", "South West", "", { type: "button" }, { onclick: () => onMoveFn("sw") })
          const wBtn = this.el("button", "West", "", { type: "button" }, { onclick: () => onMoveFn("w") })
          const nwBtn = this.el("button", "North West", "", { type: "button" }, { onclick: () => onMoveFn("nw") })
          const dirs = this.el("div", "", "directions");
          dirs.appendChild(nBtn);
          dirs.appendChild(neBtn);
          dirs.appendChild(eBtn);
          dirs.appendChild(seBtn);
          dirs.appendChild(sBtn);
          dirs.appendChild(swBtn);
          dirs.appendChild(wBtn);
          dirs.appendChild(nwBtn);
          this.buttons.appendChild(dirs);
        }
        showRetryUI(retryFn) {
          this.buttons.innerHTML = ""
          const retryBtn = this.el("button", "retry", "", { type: "button" }, { onclick: retryFn })
          this.buttons.appendChild(retryBtn);
        }
        renderTiles(tiles) {
          this.viewCanvas.setCamera(tiles[0].x - 1, tiles[0].y - 1)
          this.viewCanvas.drawTiles(tiles);
        }
        select(x, y) {
          this.viewCanvas.selectTile(x, y);
          this.viewCanvas.drawTiles();
        }
      }

      class ViewCanvas {
        canvas = document.getElementById("grid");
        ctx = this.canvas.getContext("2d");

        tiles = new Map();

        TILE_SIZE = 50;
        VIEW_SIZE = 7; // 7x7 tiles visible

        cameraX = 0;
        cameraY = 0;
        selectedTile = undefined;

        constructor() { }

        drawTile(tile, screenX, screenY) {
          switch (tile?.type) {
            case "empty":
              this.ctx.fillStyle = "#eee";
              break;
            case "wall":
              this.ctx.fillStyle = "#333";
              break;
            case "food":
              this.ctx.fillStyle = "green";
              break;
            case "hive":
              this.ctx.fillStyle = "gold";
              break;
            default:
              this.ctx.fillStyle = "#ccc"; // unknown tile
          }

          this.ctx.fillRect(screenX, screenY, this.TILE_SIZE, this.TILE_SIZE);
          this.ctx.strokeStyle = "#999"; //grid
          this.ctx.strokeRect(screenX, screenY, this.TILE_SIZE, this.TILE_SIZE);
        }

        selectTile(x, y) {
          this.selectedTile = this.tiles.get(`${x},${y}`);
        }
        deselectTile() {
          this.selectedTile = undefined;
        }
        setCamera(x, y) {
          this.cameraX = x;
          this.cameraY = y;
        }
        moveCamera(x, y) {
          this.setCamera(x, y);
          this.viewCanvas.drawTiles();
        }

        drawTiles(tiles = []) {
          tiles.forEach(t => {
            this.tiles.set(`${t.x},${t.y}`, t);
          });

          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          for (let y = 0; y < this.VIEW_SIZE; y++) {
            for (let x = 0; x < this.VIEW_SIZE; x++) {
              const worldX = this.cameraX + x;
              const worldY = this.cameraY + y;

              const tile = this.tiles.get(`${worldX},${worldY}`);

              this.drawTile(
                tile,
                x * this.TILE_SIZE,
                y * this.TILE_SIZE
              );

              if (this.selectedTile) {
                this.ctx.strokeStyle = "#000";
                let tmp = this.ctx.lineWidth
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect((this.selectedTile.x - this.cameraX) * this.TILE_SIZE, (this.selectedTile.y - this.cameraY) * this.TILE_SIZE, this.TILE_SIZE, this.TILE_SIZE);
                this.ctx.lineWidth = tmp
              }
            }
          }
        }
        unloadTiles(tiles = []) {
          tiles.forEach(t => {
            this.tiles.delete(`${t.x},${t.y}`);
          })
          this.drawTiles()
        }
      }

      class Controller {
        selectedEntity;

        constructor(model, view) {
          view.showConnectUI(() => model.establishConnection());
          model.subscribe((payload) => {
            // events from model
            switch (payload.type) {
              case "log":
                view.addHistory(payload.body, payload.from);
                break;
              case "error":
                view.addHistory({ type: "error", body: payload.body }, payload.from);
                break;
              case "connectionTry":
                view.setStatus("Connecting to server...");
                break;
              case "connectionSuccessful":
                view.setStatus("Successfully connected to server!");
                view.showControlUI((payload) => {
                  switch (payload.type) {
                    case "ping":
                      model.ping();
                      break;
                    case "hive":
                      model.whoami();
                      break;
                    default:
                      console.log("unkown input")
                  }
                })
                break;
              case "playableAnts":
                view.showAntsUI(payload.body, (ant) => {
                  view.select(ant.x, ant.y)
                  this.selectedEntity = ant;
                  view.showMoveUI(dir => {
                    console.log(`ant ${this.selectedEntity} wants to move to ${dir}`)
                    game.move(this.selectedEntity.id, dir)
                  })
                });
                break;
              case "renderTiles":
                view.renderTiles(payload.body);
                break;
              default:
                console.warn(`Unknown command: ${payload.type}`);
            }
          })
        }
      }

      const game = new Model();
      const display = new View();
      const manager = new Controller(game, display)
    </script>
  </body>

</html>
