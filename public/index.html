<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      pre {
        margin: 0
      }

      .history {
        display: flex;
        flex-direction: column-reverse;

        fieldset {
          animation: newMessage 2s ease-out forwards;

          &.error {
            animation: newError 2s ease-out forwards;
          }

          legend {
            animation: inherit;
          }
        }

      }

      @keyframes newMessage {
        from {
          background-color: #00ff7c;
        }

        to {
          background-color: rgb(255, 255, 255);
        }
      }

      @keyframes newError {
        from {
          background-color: #ff0000;
        }

        to {
          background-color: rgb(255, 255, 255);
        }
      }
    </style>
  </head>

  <body>
    <h2>Status</h2>
    <div class="status"></div>

    <h2>buttons</h2>
    <div class="buttons"></div>

    <h2>history</h2>
    <div class="history"></div>
    
    <script>
      class Model {
        constructor() {
          this.ws = null;
          this.state = {
            myHives: [],
          }
          this.listeners = [];
        }
        establishConnection() {
          this.ws = new WebSocket("ws://localhost:8080");
          this.notify({
            type: "connectionTry"
          })
          this.ws.onopen = () => this.notify({
            type: "connectionSuccessful"
          })
          this.ws.onmessage = (m) => this.handleMessage(m);
          this.ws.onerror = (e) => this.notify({
            type: "error",
            from: "Server",
            body: e,
          });
          this.ws.onclose = () => this.notify({
            type: "error",
            from: "Server",
            body: "Connection closed.",
          });
        }
        handleMessage(m) {
          try {
            const msg = JSON.parse(m.data);
            this.notify({
              type: "log",
              from: "Server",
              body: msg,
            })
            switch (msg.type) {
              case "yourHive":
                this.state.myHives.push(msg.body.hive);
                this.notify({
                  type: "playableAnts",
                  body: this.state.myHives.flatMap(h => h.ants.map(a => a.id)),
                })
            }
          } catch (e) {
            this.notify({
              type: "error",
              from: "Server",
              body: e,
            })
          }
        }
        subscribe(listener) {
          this.listeners.push(listener);
        }
        notify(payload) {
          for (const listener of this.listeners) {
            listener(payload);
          }
        }
        send(msg) {
          this.ws.send(JSON.stringify(msg));
          this.notify({
            type: "log",
            from: "Client",
            body: msg,
          })
        }
        ping() {
          this.send({ type: "ping" })
        }
        whoami() {
          this.send({ type: "whoami" })
        }
      }

      class View {
        constructor() {
          this.status = document.querySelector(".status")
          this.buttons = document.querySelector(".buttons")
          this.history = document.querySelector(".history")
          if (!this.status || !this.buttons || !this.history) {
            throw new Error("Unable to initialize UI.")
          }
        }
        el(tag, txt, cls, ...atrs) {
          const e = document.createElement(tag)
          if (txt) e.innerText = txt;
          if (typeof cls === "string") e.classList.add(...cls.split(" ").filter(Boolean));
          for (const attr of atrs) {
            if (!attr || typeof attr !== "object") continue;
            for (const [name, value] of Object.entries(attr)) {
              if (name.startsWith("on") && typeof value === "function") {
                e.addEventListener(name.slice(2), value)
              } else {
                e.setAttribute(name, value);
              }
            }
          }
          return e;
        }
        setStatus(message) {
          this.status.innerHTML = ""
          this.addStatus(message)
        }
        addStatus(message) {
          const el = this.el("div", message);
          this.status.appendChild(el)
        }
        addHistory(message, source) {
          if (typeof message === "string") message = JSON.parse(message);
          const box = this.el("fieldset", '', message.type === "error" ? "error" : "");
          const legend = this.el("legend", `${source} - ${new Date().toLocaleTimeString()}`)
          box.appendChild(legend)
          const pre = this.el("pre", JSON.stringify(message, null, 2));
          box.appendChild(pre)
          this.history.appendChild(box)
        }
        showConnectUI(connectFn) {
          this.buttons.innerHTML = "";
          const connectBtn = this.el("button", "connect", "", { type: "button" }, { onclick: connectFn })
          this.buttons.appendChild(connectBtn);
        }
        showControlUI(inputFn) {
          this.buttons.innerHTML = "";
          const pingBtn = this.el("button", "ping", "", { type: "button" }, { onclick: () => inputFn({ type: 'ping' }) })
          const hiveBtn = this.el("button", "hive", "", { type: "button" }, { onclick: () => inputFn({ type: 'hive' }) })
          this.buttons.appendChild(pingBtn);
          this.buttons.appendChild(hiveBtn);
        }
        showAntsUI(allAnts, onMoveFn) {
          allAnts.forEach((ant, i) => {
            const antBtn = this.el("button", `Ant #${i}`, "", { type: "button" }, { onclick: () => onMoveFn(ant, "north") })
            this.buttons.append(antBtn)
          })
        }
        showRetryUI(retryFn) {
          this.buttons.innerHTML = ""
          const retryBtn = this.el("button", "retry", "", { type: "button" }, { onclick: retryFn })
          this.buttons.appendChild(retryBtn);
        }
      }

      class Controller {
        constructor(model, view) {
          view.showConnectUI(() => model.establishConnection());
          model.subscribe((payload) => {
            // events from model
            switch (payload.type) {
              case "log":
                view.addHistory(payload.body, payload.from);
                break;
              case "error":
                view.addHistory(payload.body, payload.from);
                break;
              case "connectionTry":
                view.setStatus("Connecting to server...");
                break;
              case "connectionSuccessful":
                view.setStatus("Successfully connected to server!");
                view.showControlUI((payload) => {
                  switch (payload.type) {
                    case "ping":
                      model.ping();
                      break;
                    case "hive":
                      model.whoami();
                      break;
                    default:
                      console.log("unkown input")
                  }
                })
                break;
              case "playableAnts":
                view.showAntsUI(payload.body, (ant, direction) => {
                  console.log(`ant ${ant} moveds in ${direction}`);
                })
                break;
              default:
                console.warn(`Unknown command: ${payload.type}`);
            }
          })
        }
      }
      
      const game = new Model();
      const display = new View();
      const manager = new Controller(game, display)
    </script>
  </body>

</html>
